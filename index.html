<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPulse - Interactive Program Matrix</title>
    <style>
        :root {
            --bg-deep: #030611;
            --sidebar-bg: rgba(6, 11, 26, 0.85);
            --card-bg: rgba(18, 30, 58, 0.45);
            --primary: #a1e3f9;
            --primary-glow: rgba(161, 227, 249, 0.25);
            --accent-gold: #f5d061;
            --accent-purple: #c084fc;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --input-bg: #0b1329;
            --border-color: rgba(38, 59, 105, 0.6);
            --success: #2ec4b6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-deep); 
            background-image: 
                radial-gradient(circle at 5% 15%, rgba(161, 227, 249, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(192, 132, 252, 0.06) 0%, transparent 45%);
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR COMPONENT */
        .sidebar {
            width: 270px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
            z-index: 10;
            padding: 25px 20px;
        }

        .brand-section { margin-bottom: 35px; text-align: center; }
        .brand-logo { font-size: 24px; font-weight: 900; color: var(--primary); letter-spacing: 1px; text-shadow: 0 0 15px var(--primary-glow); }
        .brand-tagline { font-size: 9px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; font-weight: bold; }
        
        .nav-links-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 12px 16px; 
            color: var(--text-muted); 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .nav-item:hover, .nav-item.active { background: rgba(161, 227, 249, 0.1); color: var(--primary); }

        /* MAIN DISPLAY INTERFACE */
        .main-workspace {
            flex-grow: 1;
            padding: 35px;
            overflow-y: auto;
            height: 100vh;
            position: relative;
        }

        /* HERO BANNER */
        .inspiration-hero-card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(30, 41, 59, 0.6) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .inspiration-hero-card h2 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: 0.5px; }
        .inspiration-hero-card h2 span { color: var(--primary); }
        .inspiration-hero-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 800px; }

        /* GLOBAL TOP ACTION BAR */
        .top-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(13, 22, 44, 0.5);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
        }
        .search-wrapper { position: relative; width: 100%; max-width: 450px; }
        .search-input { 
            background: var(--input-bg); 
            border: 1px solid var(--border-color); 
            padding: 12px 20px; 
            border-radius: 25px; 
            color: #fff; 
            font-size: 13.5px; 
            width: 100%;
            transition: all 0.3s ease;
        }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .system-badge { background: rgba(46, 196, 182, 0.08); border: 1px solid rgba(46, 196, 182, 0.3); color: var(--success); padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; }

        /* VISUAL SECTORS ROW */
        .visual-sectors-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 35px;
        }
        @media (max-width: 800px) { .visual-sectors-row { grid-template-columns: repeat(2, 1fr); } }
        
        .sector-badge-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s;
        }
        .sector-graphic-icon { width: 38px; height: 38px; border-radius: 8px; background: rgba(161, 227, 249, 0.1); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--primary); flex-shrink: 0; }
        .sector-graphic-icon.purple-type { background: rgba(192, 132, 252, 0.1); color: var(--accent-purple); }
        .sector-graphic-icon.gold-type { background: rgba(245, 208, 97, 0.1); color: var(--accent-gold); }
        .sector-badge-card h4 { font-size: 13px; color: #fff; font-weight: 600; }

        /* MULTI-COLUMN LAYOUT STRUCTURE */
        .dashboard-columns-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 950px) { .dashboard-columns-grid { grid-template-columns: 1fr; } }

        .column-panel {
            background: rgba(11, 18, 36, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .column-header { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .column-header span { font-size: 11px; color: var(--text-muted); font-weight: 600; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px; margin-left: auto; }

        /* DATA CONTAINER CARDS */
        .cards-flex-stack { display: flex; flex-direction: column; gap: 16px; }
