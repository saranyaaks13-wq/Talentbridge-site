<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge - Onboarding Form</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --card-bg: #131c31;
            --primary: #f5d061;
            --primary-hover: #e0b94c;
            --text-main: #ffffff;
            --text-muted: #8fa0c4;
            --input-bg: #1c294a;
            --border-color: #2a3b63;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 40px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 40px;
        }

        .progress-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            width: 100%;
            background-color: var(--input-bg);
            z-index: 1;
        }

        .progress-bar {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            width: 0%;
            background-color: var(--primary);
            z-index: 1;
            transition: width 0.4s ease;
        }

        .step-node {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--text-muted);
            position: relative;
            z-index: 2;
            transition: all 0.4s ease;
        }

        .step-node.active {
            border-color: var(--primary);
            color: var(--primary);
            background-color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(245, 208, 97, 0.3);
        }

        .step-node.completed {
            background-color: var(--primary);
            border-color: var(--primary);
            color: var(--bg-dark);
        }

        /* Form Steps Formatting */
        .form-step {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
