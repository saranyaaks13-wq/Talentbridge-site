<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge - Onboarding Form</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --card-bg: #131c31;
            --primary: #f5d061;
            --text-main: #ffffff;
            --text-muted: #8fa0c4;
            --input-bg: #1c294a;
            --border-color: #2a3b63;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background-color: var(--card-bg); border-radius: 16px; padding: 40px; border: 1px solid var(--border-color); }
        .progress-container { display: flex; justify-content: space-between; position: relative; margin-bottom: 30px; }
        .progress-container::before { content: ''; position: absolute; top: 50%; left: 0; height: 4px; width: 100%; background-color: var(--input-bg); z-index: 1; transform: translateY(-50%); }
        .progress-bar { position: absolute; top: 50%; left: 0; height: 4px; width: 0%; background-color: var(--primary); z-index: 1; transform: translateY(-50%); transition: width 0.3s; }
        .step-node { width: 35px; height: 35px; border-radius: 50%; background-color: var(--input-bg); border: 2px solid var(--border-color); display: flex; justify-content: center; align-items: center; font-weight: bold; color: var(--text-muted); position: relative; z-index: 2; }
        .step-node.active { border-color: var(--primary); color: var(--primary); background-color: var(--bg-dark); }
        .step-node.completed { background-color: var(--primary); border-color: var(--primary); color: var(--bg-dark); }
        .form-step { display: none; }
        .form-step.active { display: block; }
        h2 { margin-bottom: 20px; font-size: 22px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; }
        input, select, textarea { background-color: var(--input-bg); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; color: var(--text-main); font-size: 14px; width: 100%; }
        textarea { height: 80px; resize: none; }
        .btn-container { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-next { background-color: var(--primary); color: var(--bg-dark); margin-left: auto; }
        .btn-prev { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }
        .plan-card { background-color: var(--input-bg); border: 2px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 15px; cursor: pointer; }
        .plan-card.selected { border-color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <div class="step-node active" data-step="1">1</div>
        <div class="step-node" data-step="2">2</div>
        <div class="step-node" data-step="3">3</div>
    </div>

    <form id="onboardingForm" onsubmit="event.preventDefault();">
        <div class="form-step active" data-step="1">
            <h2>Personal Information</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Your Name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@example.com">
            </div>
        </div>

        <div class="form-step" data-step="2">
            <h2>Primary Passion</h2>
            <div class="form-group">
                <label>Your Main Talent</label>
                <input type="text" id="passion" placeholder="e.g. Dance, Coding">
            </div>
            <div class="form-group">
                <label>Goals</label>
                <textarea id="goals" placeholder="What are your main goals?"></textarea>
            </div>
        </div>

        <div class="form-step" data-step="3">
            <h2>Select Your Plan</h2>
            <div class="plan-card selected">
                <h3>Hobbyist Plan</h3>
                <p style="color: var(--text-muted); font-size: 13px; margin-top: 5px;">Free Access to all fundamental boards.</p>
            </div>
        </div>

        <div class="btn-container">
            <button type="button" class="btn btn-prev" id="prevBtn" style="display: none;" onclick="navigateStep(-1)">← Back</button>
            <button type="button" class="btn btn-next" id="nextBtn" onclick="navigateStep(1)">Continue →</button>
        </div>
    </form>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 3;

    function navigateStep(direction) {
        document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.remove('active');
        
        currentStep += direction;

        if (currentStep > totalSteps) {
            alert("Success! Your profile has been submitted.");
            currentStep = totalSteps;
        }

        document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.add('active');
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('.step-node').forEach((node, idx) => {
            const stepNum = idx + 1;
            node.classList.remove('active', 'completed');
            if (stepNum === currentStep) node.classList.add('active');
            else if (stepNum < currentStep) node.classList.add('completed');
        });

        document.getElementById('progressBar').style.width = ((currentStep - 1) / (totalSteps - 1)) * 100 + '%';
        document.getElementById('prevBtn').style.display = currentStep === 1 ? 'none' : 'block';
        document.getElementById('nextBtn').innerText = currentStep === totalSteps ? 'Submit ✨' : 'Continue →';
    }
</script>

</body>
