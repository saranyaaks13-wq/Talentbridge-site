<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPulse - Interactive Talent Matrix</title>
    <style>
        :root {
            --bg-deep: #050811;
            --sidebar-bg: rgba(10, 16, 32, 0.9);
            --card-bg: rgba(20, 32, 58, 0.55);
            --primary: #a1e3f9;
            --primary-glow: rgba(161, 227, 249, 0.25);
            --accent-gold: #f5d061;
            --text-main: #ffffff;
            --text-muted: #8da2cc;
            --input-bg: #15223d;
            --border-color: rgba(35, 53, 92, 0.6);
            --accent-red: #ff5e62;
            --success: #2ec4b6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-deep); 
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(161, 227, 249, 0.07) 0%, transparent 35%),
                radial-gradient(circle at 85% 75%, rgba(245, 208, 97, 0.04) 0%, transparent 40%);
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            overflow: hidden;
        }

        /* ================= SIDEBAR COMPONENT ================= */
        .sidebar {
            width: 330px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            height: 100vh;
            flex-shrink: 0;
            z-index: 10;
        }

        .brand-section { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .brand-logo { font-size: 26px; font-weight: 900; color: var(--primary); letter-spacing: 1px; text-shadow: 0 0 15px var(--primary-glow); }
        .brand-tagline { font-size: 10px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 3px; margin-top: 6px; font-weight: bold; }

        .profile-setup-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        .profile-setup-box h3 { font-size: 13px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

        /* INTERACTIVE AUDIO WATERFALL */
        .audio-widget {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .audio-title { font-size: 11px; font-weight: bold; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        .audio-btn { background: var(--primary); border: none; padding: 8px 16px; border-radius: 20px; color: var(--bg-deep); font-size: 10px; font-weight: bold; cursor: pointer; }
        
        .wave-container { display: flex; justify-content: center; gap: 3px; height: 15px; margin-top: 12px; align-items: flex-end; }
        .wave-bar { width: 3px; height: 3px; background-color: var(--primary); border-radius: 3px; }
        .wave-container.playing .wave-bar { animation: jumpPulse 0.8s ease-in-out infinite alternate; }
        .wave-container.playing .wave-bar:nth-child(2) { animation-delay: 0.15s; }
        .wave-container.playing .wave-bar:nth-child(3) { animation-delay: 0.3s; }
        @keyframes jumpPulse { 0% { height: 3px; } 100% { height: 15px; background-color: var(--accent-gold); } }

        /* ================= MAIN DISPLAY CANVAS ================= */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }
        .content-container { width: 100%; max-width: 880px; }

        /* PAGE 1: STEALTH LANDING VIEW SCREEN */
        .page-stage { width: 100%; }
        #pageLandingStage { display: flex; justify-content: center; align-items: center; }
        
        .stealth-lock-card {
            background: rgba(13, 20, 36, 0.3);
            border: 2px dashed var(--border-color);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            color: var(--text-muted);
            max-width: 580px;
            backdrop-filter: blur(6px);
        }
        .stealth-lock-card h2 { color: #fff; margin-bottom: 12px; font-size: 22px; }

        /* PAGE 2: REAL-TIME SECURE ECOSYSTEM SHEET VIEW */
        #pageDashboardStage { display: none; }
        
        .welcome-hero {
            text-align: center;
            padding: 40px 30px;
            background: linear-gradient(135deg, rgba(20, 33, 61, 0.7) 0%, rgba(10, 15, 28, 0.9) 100%);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: slideUpTransition 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .welcome-hero h1 { font-size: 34px; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .welcome-hero h1 span { color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); }
        .welcome-hero p { color: var(--text-muted); font-size: 14px; max-width: 600px; margin: 0 auto; }

        /* Multi-Category Grid */
        .course-sectors-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .sector-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 18px; border-radius: 12px; text-align: center; }
        .sector-icon { font-size: 24px; margin-bottom: 10px; }
        .sector-card h4 { font-size: 14px; color: #fff; margin-bottom: 4px; }
        .sector-card span { font-size: 11px; color: var(--text-muted); display: block; }

        /* DATA SHEET CARDS STRUCTURE */
        .talent-sheet-wrapper { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; }
