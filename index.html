<!DOCTYPE html>
<html>
<head>
    <title>AuraPulse Fix</title>
    <style>
        body { background: #05050d; color: white; font-family: sans-serif; display: flex; }
        .sidebar { width: 250px; background: #0d1122; height: 100vh; padding: 20px; }
        .main { padding: 40px; color: white; }
        .box { background: #1a1f35; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        h1 { color: #00f0ff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>AuraPulse</h2>
        <p onclick="location.reload()" style="cursor:pointer; color: #aaa;">Click to Reload</p>
    </div>

    <div class="main">
        <div class="box">
            <h1>System Operational</h1>
            <p>If you can see this text, the browser is finally allowing the code to render.</p>
            <p id="debug-msg"></p>
        </div>
    </div>

    <script>
        document.getElementById('debug-msg').innerText = "Status: Script engine active at " + new Date().toLocaleTimeString();
    </script>

</body>
