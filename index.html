<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraPulse Ultra - Nexus Portal</title>
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --cyber-purple: #bd00ff;
            --gold-alert: #ffb800;
            --secure-green: #00ff66;
            --bg-void: #05050d;
            --panel-glass: rgba(13, 17, 33, 0.75);
            --border-glow: rgba(0, 240, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg-void); 
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(189, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(0, 240, 255, 0.12) 0%, transparent 50%);
            color: #ffffff; 
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ================= PREMIUM VERTICAL NAVIGATION BAR ================= */
        .sidebar {
            width: 290px;
            background: linear-gradient(180deg, #070913 0%, #030408 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 35px 22px;
            flex-shrink: 0;
            justify-content: space-between;
        }

        .brand-section { padding-left: 10px; }
        .brand-logo { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .brand-logo span { color: var(--neon-cyan); text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); }
        .brand-tagline { font-size: 10px; color: var(--gold-alert); text-transform: uppercase; margin-top: 6px; letter-spacing: 2px; font-weight: 700; }
        .brand-subtext { font-size: 12px; color: #4e5d78; margin-top: 5px; font-style: italic; }
        
        .nav-links-list { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-top: 40px; flex-grow: 1; }
        .nav-item { 
            padding: 14px 18px; 
            color: #7e8c9f; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 700;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-item .nav-icon { font-size: 18px; filter: grayscale(40%); }
        .nav-item:hover { background: rgba(0, 240, 255, 0.05); color: var(--neon-cyan); border-color: rgba(0, 240, 255, 0.2); }
        .nav-item.active { background: linear-gradient(90deg, rgba(0,240,255,0.15) 0%, transparent 100%); color: #fff; border-left: 4px solid var(--neon-cyan); border-color: rgba(0, 240, 255, 0.3) rgba(0, 240, 255, 0.05) rgba(0, 240, 255, 0.05) rgba(0, 240, 255, 0.3); }

        .sidebar-footer-shield {
            background: rgba(0, 255, 102, 0.04);
            border: 1px dashed rgba(0, 255, 102, 0.2);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--secure-green);
        }

        /* ================= CENTRAL VIEWSPACE LAYOUT ================= */
        .main-workspace {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            height: 100vh;
        }

        .app-view-screen { display: none; }
        .app-view-screen.active-view { display: block; animation: viewSlideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes viewSlideIn {
            from { opacity: 0; transform: translateY(15px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* ================= DESIGN BANNER HEADER HERO ================= */
        .inspiration-hero-card {
            background: linear-gradient(135deg, rgba(15, 21, 44, 0.8)
